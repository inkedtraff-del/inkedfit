<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Secured - Inked Fit Elite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --yellow: #fcd34d; 
            --black: #0b0b0b; 
            --dark-bg: #141414; 
            --white: #ffffff; 
            --gray: #262626; 
            --text-m: #9ca3af; 
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111111;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Твой дизайн карточки */
        .success-card {
            background: var(--dark-bg);
            border: 1px solid var(--gray);
            border-top: 4px solid var(--yellow);
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .icon-wrapper {
            background: rgba(252, 211, 77, 0.1);
            color: var(--yellow);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
        }

        .success-title {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--white);
        }

        .success-text {
            color: var(--text-m);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--yellow);
            color: var(--black);
            text-decoration: none;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 16px 30px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(252, 211, 77, 0.2);
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 211, 77, 0.4);
        }

        .backup-text {
            margin-top: 25px;
            font-size: 13px;
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .success-card {
                padding: 40px 20px;
            }
            .success-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <!-- Твоя иконка галочки -->
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1 class="success-title">PURCHASE SECURED</h1>
        <p class="success-text">The protocol is ready. Click below to open and install your 10% Blueprint app.</p>
        
        <!-- Ссылка на твой сайт Vercel вместо скачивания PDF -->
        <a href="https://manplan.vercel.app/" class="button">
            OPEN APP
            <!-- Иконка стрелки для перехода в приложение -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>
                <path d="M12 5l7 7-7 7"></path>
            </svg>
        </a>
        
        <!-- Твой текст -->
        <p class="backup-text">A backup copy has been sent to your email.</p>
    </div>

</body>
</html>
