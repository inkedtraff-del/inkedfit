    <style>
        :root {
            --yellow: #FFCC00;
            --black: #0b0b0b;
            --pure-black: #000000;
            --white: #ffffff;
            --text-gray: #d1d5db;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER SECTION */
        .header-group {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header-group h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 64px;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -1px;
        }
        
        .header-group h1 .white { color: var(--white); }
        .header-group h1 .yellow { color: var(--yellow); }
        
        .header-group .sub-logo {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-gray);
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* INTRO TEXT */
        .success-title {
            font-family: 'Oswald', sans-serif;
            color: var(--yellow);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 15px 0;
            text-align: center;
        }
        
        .success-desc {
            color: var(--text-gray);
            font-size: 16px;
            line-height: 1.6;
            text-align: center;
            max-width: 480px;
            margin: 0 0 50px 0;
        }

        /* YELLOW CARD */
        .yellow-card {
            background-color: var(--yellow);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        /* CARD CONTENT */
        .card-label {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--pure-black);
            letter-spacing: 1px;
            margin: 0 0 10px 0;
        }

        .card-main-text {
            font-family: 'Oswald', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--pure-black);
            line-height: 1;
            margin: 0 0 25px 0;
            text-transform: uppercase;
        }

        /* YELLOW PILL */
        .pill {
            background-color: rgba(0, 0, 0, 0.08);
            color: var(--pure-black);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 800;
            padding: 12px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        /* BLACK BUTTON */
        .btn {
            background-color: var(--pure-black);
            color: var(--white);
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            background-color: #1a1a1a;
        }

        .backup-text {
            color: #6b7280;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .header-group h1 { font-size: 52px; }
            .yellow-card { padding: 40px 20px; }
            .card-main-text { font-size: 48px; }
        }
    </style>
</head>
<body>

    <div class="header-group">
