    <style>
        :root {
            --bg-darker: #080808;
            --yellow: #FFD600;
            --text-white: #FFFFFF;
            --text-gray: #A0A0A0;
            --card-gray: #1C1C1E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-darker); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased; 
        }
        
        .success-card {
            max-width: 400px; 
            width: 90%; 
            background: var(--card-gray); 
            padding: 50px 25px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            text-align: center; 
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            border: 2px solid var(--yellow);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            background: rgba(255, 214, 0, 0.05);
        }

        .icon-wrapper svg {
            stroke: var(--yellow);
            width: 32px;
            height: 32px;
        }

        .success-title {
            font-family: 'Oswald', sans-serif;
            font-size: 32px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: var(--text-white); 
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .success-text {
            color: #ccc;
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 35px;
            font-weight: 500;
        }

        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 900; 
            font-family: 'Oswald', sans-serif;
            border: none; 
            border-radius: 12px; 
            color: #000;
            background: var(--yellow); 
            text-transform: uppercase; 
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s ease;
        }

        .button:active {
            transform: scale(0.98);
        }

        .backup-text {
            margin-top: 30px; 
            font-size: 11px; 
            color: var(--text-gray); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }
